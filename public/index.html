<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #111;
        }

        /* 右下のフローティングボタンのコンテナ */
        #fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        /* 非アクティブ時にボタンを非表示にするクラス */
        #fab-container.hidden {
            opacity: 0;
            pointer-events: none;
            /* 透明時はクリック不可にする */
        }

        /* 非アクティブ時にマウスカーソルを消すクラス */
        .hide-cursor {
            cursor: none;
        }

        /* スクロールバーを最初から常に非表示にする (表示切り替え時のレイアウトのズレを防止) */
        html {
            -ms-overflow-style: none;
            /* IE, Edge (Legacy) */
            scrollbar-width: none;
            /* Firefox */
        }

        html::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Edge (Chromium) */
            width: 0;
            height: 0;
        }

        .fab-wrapper {
            position: relative;
        }

        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #333;
            color: white;
            border: 2px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            outline: none;
        }

        .fab:hover {
            background-color: #555;
            transform: scale(1.1);
        }

        .fab:active {
            transform: scale(0.95);
            background-color: #777;
        }

        .fab svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        /* スピードメーターの表示 */
        #speed-indicator {
            position: absolute;
            right: 70px;
            /* ボタンの左側に表示 */
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 横3列、独立カラムレイアウト (Masonry風・画像の再配置を防ぐ) */
        #gallery {
            display: flex;
            width: 100%;
            padding-top: 20px; /* 切り替え時の密着感を解消 */
            justify-content: center; /* 少数の場合の中央寄せ */
            transition: opacity 0.3s ease; /* モード切替のフェード用 */
        }

        #gallery.rtl {
            flex-direction: row-reverse;
        }
        
        #gallery.loading {
            opacity: 0;
        }

        .gallery-col {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
        }

        #gallery img {
            width: 100%;
            height: auto;
            display: block;
            /* img下部の余白を消す */
            padding: 0;
            margin: 0;
            margin-bottom: 4px; /* 画像間に適切なリズムを追加 */
            border: none;
            opacity: 0;
            /* フェードイン用: 初期は透明 */
            transition: opacity 0.6s ease-in-out;
            /* ゆっくり表示させる */
        }

        #gallery img.loaded {
            opacity: 1;
            /* フェードイン用: クラス追加で表示 */
        }

        .fab-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        #mode-overlay {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(20, 20, 20, 0.85);
            color: #fff;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: 600;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #mode-overlay.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #mode-overlay .mode-icon {
            width: 24px;
            height: 24px;
            fill: #3498db;
        }

        #mode-overlay .image-count {
            margin-left: 8px;
        }

        /* シークバーのスタイル */
        #seekbar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 900px;
            height: 40px;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #seekbar-container.user-hidden {
            transform: translateX(-50%) translateY(80px);
            opacity: 0;
            pointer-events: none;
        }

        #seekbar {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            cursor: pointer;
        }

        #seekbar::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        #seekbar::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #3498db;
            margin-top: -6px;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);
            border: 2px solid #fff;
            transition: all 0.2s ease;
        }

        #seekbar:hover::-webkit-slider-thumb {
            transform: scale(1.2);
            background: #5dade2;
        }

        #seekbar-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85em;
            font-weight: 600;
            min-width: 100px;
            text-align: right;
            margin-left: 15px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        #seekbar-tooltip {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: rgba(40, 40, 40, 0.95);
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.1s ease;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div id="mode-overlay"></div>

    <!-- 右下のアイコンボタン群 -->
    <div id="fab-container">
        <!-- 上スクロールボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="scrollUpBtn" title="上にスクロール (押すたびに加速)">
                <svg viewBox="0 0 24 24">
                    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
                </svg>
            </button>
        </div>

        <!-- 停止ボタン -->
        <div class="fab-wrapper">
            <div id="speed-indicator">Speed: 0</div>
            <button class="fab" id="stopBtn" title="スクロール停止">
                <svg viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
        </div>

        <!-- 下スクロールボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="scrollDownBtn" title="下にスクロール (押すたびに加速)">
                <svg viewBox="0 0 24 24">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" />
                </svg>
            </button>
        </div>

        <!-- フルスクリーンボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="fullscreenBtn" title="フルスクリーン切替 (F)">
                <svg viewBox="0 0 24 24" id="fullscreenIcon">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
            </button>
        </div>

        <!-- ソート切替ボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="sortBtn" title="ソート切替 (R)">
                <svg viewBox="0 0 24 24" id="sortIcon">
                    <path
                        d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
                </svg> <!-- ランダムアイコン(デフォルト) -->
            </button>
        </div>

        <!-- 列数変更ボタン -->
        <div class="fab-row" id="colBtnRow">
            <div class="fab-wrapper">
                <button class="fab" id="colMinusBtn" title="列を減らす (←)">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>
            <div class="fab-wrapper">
                <button class="fab" id="colPlusBtn" title="列を増やす (→)">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 表示順切替ボタン (Dual View専用) -->
        <div class="fab-wrapper" id="dirBtnWrapper" style="display: none;">
            <button class="fab" id="dirBtn" title="表示順切替 (O)">
                <svg viewBox="0 0 24 24" id="dirIcon">
                    <path
                        d="M19 15l-3.5-3.5L14 13l2.5 2.5H5v2h11.5L14 20l1.5 1.5L19 18v-3zM5 9l3.5 3.5L10 11 7.5 8.5H19v-2H7.5L10 4 8.5 2.5 5 6v3z" />
                </svg>
            </button>
        </div>

        <!-- 表示モード切替ボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="modeBtn" title="表示モード切替 (M)">
                <svg viewBox="0 0 24 24" id="modeIcon">
                    <path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h10v6zm0-7h5V5h-5v6zm6-6v6h5V5h-5z" />
                </svg>
            </button>
        </div>

        <!-- シークバー切替ボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="seekbarToggleBtn" title="シークバー表示切替 (S)">
                <svg viewBox="0 0 24 24" id="seekbarToggleIcon">
                    <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h6V7h-6V5h-2v6h2V9z" />
                </svg>
            </button>
        </div>

        <!-- 再読み込みボタン -->
        <div class="fab-wrapper" style="margin-top: 10px;">
            <button class="fab" id="reloadBtn" title="画像を再読み込み">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 画面下部のシークバー -->
    <div id="seekbar-container" class="user-hidden">
        <div id="seekbar-tooltip">0 / 0</div>
        <input type="range" id="seekbar" min="0" value="0" step="1">
        <div id="seekbar-info">0 / 0</div>
    </div>

    <div id="gallery"></div>

    <script src="js/dual-view.js"></script>
    <script src="js/gallery-view.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
