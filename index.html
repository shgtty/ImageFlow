<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #111;
        }
        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 0;
            font-size: 0.9em;
            z-index: 1000;
            text-align: center;
            backdrop-filter: blur(5px);
            pointer-events: none; /* クリックを透過 */
            transition: opacity 0.5s ease;
            opacity: 1; /* 初期状態は表示 */
        }
        
        /* 右下のフローティングボタンのコンテナ */
        #fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        /* 非アクティブ時にボタンを非表示にするクラス */
        #fab-container.hidden {
            opacity: 0;
            pointer-events: none; /* 透明時はクリック不可にする */
        }
        
        .fab-wrapper {
            position: relative;
        }

        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #333;
            color: white;
            border: 2px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            outline: none;
        }
        
        .fab:hover {
            background-color: #555;
            transform: scale(1.1);
        }
        
        .fab:active {
            transform: scale(0.95);
            background-color: #777;
        }
        
        .fab svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }
        
        /* スピードメーターの表示 */
        #speed-indicator {
            position: absolute;
            right: 70px; /* ボタンの左側に表示 */
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 横3列、独立カラムレイアウト (Masonry風・画像の再配置を防ぐ) */
        #gallery {
            display: flex;
            width: 100%;
            align-items: flex-start;
        }
        .gallery-col {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
        }
        #gallery img {
            width: 100%;
            height: auto;
            display: block; /* img下部の余白を消す */
            padding: 0;
            margin: 0;
            border: none;
            opacity: 0; /* フェードイン用: 初期は透明 */
            transition: opacity 0.6s ease-in-out; /* ゆっくり表示させる */
        }
        #gallery img.loaded {
            opacity: 1; /* フェードイン用: クラス追加で表示 */
        }
    </style>
</head>
<body>
    <div id="status-bar"><span id="status">サーバーと通信中...</span></div>

    <!-- 右下のアイコンボタン群 -->
    <div id="fab-container">
        <!-- 上スクロールボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="scrollUpBtn" title="上にスクロール (押すたびに加速)">
                <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </button>
        </div>
        
        <!-- 停止ボタン -->
        <div class="fab-wrapper">
            <div id="speed-indicator">Speed: 0</div>
            <button class="fab" id="stopBtn" title="スクロール停止">
                <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            </button>
        </div>
        
        <!-- 下スクロールボタン -->
        <div class="fab-wrapper">
            <button class="fab" id="scrollDownBtn" title="下にスクロール (押すたびに加速)">
                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
            </button>
        </div>
        
        <!-- 再読み込みボタン -->
        <div class="fab-wrapper" style="margin-top: 20px;">
            <button class="fab" id="reloadBtn" title="画像を再読み込み">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>
    </div>
    
    <div id="gallery"></div>

    <script src="script.js"></script>
</body>
</html>
